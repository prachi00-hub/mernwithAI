<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="project2.css" />
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Amazon Clone</title>
  </head>

  <body>
    <header>
      <nav>
        <div class="nav-left">
          <div class="nav-logo">
            <img
              src="https://media.geeksforgeeks.org/wp-content/uploads/20240326183545/amazon.png"
            />
          </div>
          <div class="location">
            <p class="top-text">Deliver to</p>
            <div class="location-icon">
              <i class="fa-solid fa-location-dot"></i>
              <p class="bottom-text">India</p>
            </div>
          </div>
        </div>

        <div class="nav-center">
          <select class="search-dropdown">
            <option>All</option>
            <option>Electronics</option>
            <option>Home & Kitchen</option>
            <option>Books</option>
            <option>Toys</option>
            
          </select>
          <input type="text" placeholder="Search Amazon" class="search-box" />
          <div class="search-icon">
            <i class="fa-solid fa-magnifying-glass" style="color: #28416c"> </i>
          </div>
        </div>

        <div class="nav-right">
          <div class="language-option">
            <div class="flag">
              <i class="fa-regular fa-flag"></i>
            </div>
            <select class="select-language">
              <option value="lan">EN</option>
              <option value="lan">ES</option>
              <option value="lan">AR</option>
            </select>
          </div>

          <div class="account-option">
            <p class="top-text">Hello, sign in</p>
            <select class="select-account">
              <option value="Account">Account & Lists</option>
              <option value="Account">Account & Lists</option>
              <option value="Account">Account & Lists</option>
            </select>
          </div>

          <div class="order-option">
            <p class="top-text">Returns</p>
            <p class="bottom-text">& Orders</p>
          </div>

          <div class="cart-option">
            <div class="cart-logo">
              <i class="fa-solid fa-cart-shopping"></i>
            </div>
            Cart
          </div>
        </div>
      </nav>

      <div class="nav-options">
        <div class="all-logo">
          <i class="fa-solid fa-bars"></i>
          <p class="list">All</p>
        </div>

        <div class="options">
          <p>Today's Deals</p>
          <p>Customer Service</p>
          <p>Registry</p>
          <p>Gift Cards</p>
          <p>Sell</p>
        </div>
      
    </header>

    <div class="hero-section">

    </div>
    <div>
      <h2 class="class-color" id="h2">Recommended Products</h2>
    </div>
    <div class="shop-section">
      <div class="box1 box">box1</div>
      <div class="box2 box">box2</div>
      <div class="box3 box">box3</div>
      <div class="box4 box">box4</div>
    </div>
   
    </body>
    </html>
